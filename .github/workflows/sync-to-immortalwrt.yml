name: 🔄 手动同步到 ImmortalWrt 官方库

# workflow_dispatch手动触发，去掉了所有的 push 触发
on:
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出核心代码 (luci-app-netwiz)
        uses: actions/checkout@v4
        with:
          path: source-repo

      - name: 2. 检出目标仓库 (ImmortalWrt Fork)
        uses: actions/checkout@v4
        with:
          repository: huchd0/luci  # ⚠️ 请确认这是您的 fork 仓库地址
          token: ${{ secrets.SYNC_TOKEN }} # 使用刚才配置的跨仓库钥匙
          path: dest-repo
          ref: master # ⚠️ immortalwrt/luci 的主分支通常是 master，根据实际情况修改

      - name: 3. 同步执行
        run: |
          echo "🧹 清空目标仓库的旧文件..."
          rm -rf dest-repo/applications/luci-app-netwiz/*
          mkdir -p dest-repo/applications/luci-app-netwiz/
          
          echo "📦 复制最新代码..."
          rsync -av --exclude='.git/' --exclude='.github/' source-repo/luci-app-netwiz/ dest-repo/applications/luci-app-netwiz/

      - name: 4. 提交并推送到 Fork 仓库的专属分支
        run: |
          cd dest-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 创建一个专门用于提交 PR 的分支
          BRANCH_NAME="add-luci-app-netwiz"
          git checkout -B $BRANCH_NAME
          
          git add applications/luci-app-netwiz/
          
          if git diff --cached --quiet; then
            echo "✅ 代码完全一致，不需要重复同步。"
          else
            # commit message 直接写成官方要求的格式
            git commit -m "luci-app-netwiz: add new application"
            
            # 推送到您的 Fork 仓库的这个新分支
            git push -f origin $BRANCH_NAME
            echo "🚀 成功推送到 Fork 仓库的 $BRANCH_NAME 分支！"
          fi
